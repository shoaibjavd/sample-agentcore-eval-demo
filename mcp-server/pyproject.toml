[project]
name = "mcp-server"
version = "0.1.0"
description = "MCP Server providing additional tools for the assistant agent"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=0.3.0",
    "pydantic>=2.0.0",
    "python-json-logger>=2.0.0",
    "msal>=1.31.0",
    "aioboto3>=13.0.0",
    "cachetools>=5.5.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
